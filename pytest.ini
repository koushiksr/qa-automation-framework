[pytest]
# Base configuration
pythonpath = .
testpaths = tests

# Command line options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --alluredir=reports/allure-results
    --html=reports/html/latest_run.html
    --self-contained-html
    --disable-warnings

# Verbosity and output
console_output_style = count
showlocals = true

# Markers for category-based execution
markers =
    smoke: Quick validation tests (sanity check)
    regression: Full suite regression tests
    critical: High-risk patient safety tests (must pass)
    api: Model/backend API tests
    ui: UI validation tests
    integration: Integration tests between components
    performance: Performance and load tests
    slow: Tests that take longer to execute
    wip: Work in progress tests (expected to fail)
    flaky: Known flaky tests (use with --reruns)

# Custom markers for filtering
    feature_auth: Authentication and authorization tests
    feature_patient: Patient management tests
    feature_model: Model inference tests
    feature_agent: AI agent workflow tests
    db_required: Tests requiring database connection
    external_api: Tests calling external APIs

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Log file configuration
log_file = reports/logs/pytest_{now}.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test execution
timeout = 300
disable_test_id_escaping = true

# Rerun configuration (requires pytest-rerunfailures)
rerunfailures_capture_stdout = true
